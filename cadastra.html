<!doctype html>
<html lang="pt">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Landing 3D Gestão</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="icon" href="logo1.png" sizes="32x32" type="image/png">
    <link rel="icon" href="logo2.png" sizes="192x192" type="image/png">
    <link rel="apple-touch-icon" href="logo3.png">
    <link rel='stylesheet' href='https://cdn-uicons.flaticon.com/4.0.0/uicons-solid-rounded/css/uicons-solid-rounded.css'>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        bg0: '#0a0f1d',
                        bg1: '#0b1220',
                        bg2: '#101c33',
                        panel: '#0f1a2b',
                        glass: 'rgba(255,255,255,0.08)',
                        edge: '#223149',
                        primary: '#7aa2ff',
                        primary2: '#3b82f6'
                    },
                    fontFamily: { sans: ['Inter', 'system-ui', '-apple-system', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'] },
                    borderRadius: { card: '28px' },
                    boxShadow: {
                        panel: '0 0 0 1px rgba(34,49,73,.5), 0 18px 60px rgba(0,0,0,.45)',
                        inner: 'inset 0 0 0 1px rgba(255,255,255,.06), inset 0 10px 30px rgba(255,255,255,.04)',
                        glow: '0 0 40px rgba(122,162,255,.35), 0 10px 40px rgba(59,130,246,.25)'
                    }
                }
            }
        }
    </script>

    <style>
        @keyframes fadeSlideUp {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }

            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body class=" text-white font-sans antialiased overflow-x-hidden">
    <!-- Preloader -->
    <div id="preloader" class="fixed inset-0  backdrop-blur-3xl flex items-center justify-center z-[9999]">
        <div
            class="w-28 h-28 border-8 text-blue-400 text-4xl animate-spin border-gray-300 flex items-center justify-center border-t-blue-400 rounded-full">
            <img height="30em" width="30em" class="animate-ping" src="logo1.png" alt="">
        </div>

    </div>

    <!-- Fundo Tech -->
    <div class="fixed inset-0 -z-50 overflow-hidden">

        <!-- Gradiente base -->
        <div class="absolute inset-0 bg-gradient-to-br from-[#070b14] via-[#0b1220] to-[#0a0f1d]"></div>

        <!-- Linhas tech (grid) -->
        <div class="absolute inset-0 opacity-20" style="background-image: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px),
                                   linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px);
                   background-size: 40px 40px;">
        </div>

        <!-- Glow azul -->
        <div
            class="absolute top-0 left-1/2 -translate-x-1/2 w-[900px] h-[500px] bg-blue-500/20 blur-[120px] rounded-full">
        </div>

        <!-- Glow lateral -->
        <div class="absolute bottom-0 right-0 w-[600px] h-[400px] bg-indigo-500/20 blur-[100px] rounded-full"></div>

        <!-- Linha diagonal tech -->
        <div class="absolute inset-0 opacity-10" style="background-image: linear-gradient(120deg, transparent 48%, rgba(122,162,255,0.4) 50%, transparent 52%);
                   background-size: 200% 200%;
                   animation: moveLines 12s linear infinite;">
        </div>

    </div>


    <main id="inicio" class="mx-auto">

        <div class=" max-w-7xl mx-auto flex  h-[700px] w-full">

            <div class=" w-full flex flex-col items-center justify-center">

                <form
                    class=" backdrop-blur-md shadow-2xl rounded-xl p-8 md:w-96 w-80 flex flex-col items-center justify-center">
                    <h2 class="text-4xl text-gray-100 font-medium">Cadastre-se</h2>
                    <p class="text-sm text-gray-100/90 mt-3">Cadastre-se com sua conta</p>

                    <button type="button"
                        class="w-full mt-8 bg-gray-500/10 flex items-center justify-center h-12 rounded-full">
                        <img src="https://raw.githubusercontent.com/prebuiltui/prebuiltui/main/assets/login/googleLogo.svg"
                            alt="googleLogo">
                    </button>

                    <div class="flex items-center gap-4 w-full my-5">
                        <div class="w-full h-px bg-gray-300/90"></div>
                        <p class="w-full text-nowrap text-sm text-gray-100/90">ou cadastre-se com email</p>
                        <div class="w-full h-px bg-gray-300/90"></div>
                    </div>

                    <div
                        class="flex items-center w-full bg-transparent border border-gray-300/60 hover:border-primary2 h-12 rounded-full overflow-hidden pl-6 gap-2">
                        <img height="11" width="16" src="do-utilizador.png" alt="">
                        <input type="email" placeholder="Email id"
                            class="bg-transparent text-gray-500/80 placeholder-gray-500/80 outline-none text-sm w-full h-full"
                            required>
                    </div>

                    <div
                        class="flex items-center mt-6 w-full bg-transparent border border-gray-300/60 hover:border-primary2 h-12 rounded-full overflow-hidden pl-6 gap-2">
                        <svg width="16" height="11" viewBox="0 0 16 11" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path fill-rule="evenodd" clip-rule="evenodd"
                                d="M0 .55.571 0H15.43l.57.55v9.9l-.571.55H.57L0 10.45zm1.143 1.138V9.9h13.714V1.69l-6.503 4.8h-.697zM13.749 1.1H2.25L8 5.356z"
                                fill="#6B7280" />
                        </svg>
                        <input type="email" placeholder="Email id"
                            class="bg-transparent text-gray-500/80 placeholder-gray-500/80 outline-none text-sm w-full h-full"
                            required>
                    </div>

                    <div
                        class="flex items-center mt-6 w-full bg-transparent border border-gray-300/60 hover:border-primary2  h-12 rounded-full overflow-hidden pl-6 gap-2">
                        <svg width="13" height="17" viewBox="0 0 13 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M13 8.5c0-.938-.729-1.7-1.625-1.7h-.812V4.25C10.563 1.907 8.74 0 6.5 0S2.438 1.907 2.438 4.25V6.8h-.813C.729 6.8 0 7.562 0 8.5v6.8c0 .938.729 1.7 1.625 1.7h9.75c.896 0 1.625-.762 1.625-1.7zM4.063 4.25c0-1.406 1.093-2.55 2.437-2.55s2.438 1.144 2.438 2.55V6.8H4.061z"
                                fill="#6B7280" />
                        </svg>
                        <input type="password" placeholder="Password"
                            class="bg-transparent text-gray-500/80 placeholder-gray-500/80 outline-none text-sm w-full h-full"
                            required>
                    </div>

                     <div
                        class="flex items-center mt-6 w-full bg-transparent border border-gray-300/60 hover:border-primary2  h-12 rounded-full overflow-hidden pl-6 gap-2">
                        <svg width="13" height="17" viewBox="0 0 13 17" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M13 8.5c0-.938-.729-1.7-1.625-1.7h-.812V4.25C10.563 1.907 8.74 0 6.5 0S2.438 1.907 2.438 4.25V6.8h-.813C.729 6.8 0 7.562 0 8.5v6.8c0 .938.729 1.7 1.625 1.7h9.75c.896 0 1.625-.762 1.625-1.7zM4.063 4.25c0-1.406 1.093-2.55 2.437-2.55s2.438 1.144 2.438 2.55V6.8H4.061z"
                                fill="#6B7280" />
                        </svg>
                        <input type="password" placeholder="Password"
                            class="bg-transparent text-gray-500/80 placeholder-gray-500/80 outline-none text-sm w-full h-full"
                            required>
                    </div>


                    <div class="w-full flex items-center justify-between mt-8 text-gray-500/80">
                        <div class="flex items-center gap-2">
                            <input class="h-5" type="checkbox" id="checkbox">
                            <label class="text-sm text-gray-100" for="checkbox">Lembre-se de mim</label>
                        </div>
                        <a class="text-sm text-gray-100 underline" href="#">Esqueceu a senha?</a>
                    </div>

                    <button type="submit"
                        class="mt-8 w-full h-11 rounded-full text-white bg-[#1b75b9] hover:opacity-90 transition-opacity">
                        Cadastre-se
                    </button>
                    <p class="text-gray-500/90 text-sm mt-4">Já tens uma conta? <a
                            class="text-[#1b75b9] hover:underline" href="#">Faz login na tua conta</a></p>
                </form>
            </div>
        </div>
    </main>

    <script>
        const start = Date.now();

        window.addEventListener("load", () => {
            const preloader = document.getElementById("preloader");

            const minTime = 3500; // mínimo 3.5s
            const elapsed = Date.now() - start;
            const remaining = Math.max(0, minTime - elapsed);

            setTimeout(() => {
                preloader.style.opacity = "0";

                setTimeout(() => {
                    preloader.style.display = "none";
                }, 500);

            }, remaining);
        });
    </script>

</body>

</html>
